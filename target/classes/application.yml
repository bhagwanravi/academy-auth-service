  secret: ${JWT_SECRET:rxjHJ9PsG0ExDm2LJ4RVtOOWz3kuKi7MMw+Sh4YLA0V/KfG+HBBk4LJxg7sEU+U86OJXyzDUidk6vRGr3/l1MQ==}
  expiration: 86400000 # 24 hours
