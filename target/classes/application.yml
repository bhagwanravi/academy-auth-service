logging:
  level:
    com.example.academy.auth: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,eureka,env
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
  health:
    defaults:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  info:
    title: Auth Service API
    description: Authentication and Authorization API for Academy Management System
    version: 1.0.0
    contact:
      name: Academy Management Team
#      email: bhagwankumarcr7@gmail.com

# Security Configuration
app:
  security:
    public-paths:
      - /api/auth/**
      - /api/test/admin/**
      - /swagger-ui/**
      - /v3/api-docs/**
      - /api-docs/**
      - /swagger-ui.html
      - /h2-console/**
      - /actuator/**
      - /actuator/health
      - /actuator/info
      - /actuator/metrics
    unauthorized-api-paths:
      - /api/auth/login
      - /api/auth/register
      - /api/auth/forgot-password
      - /api/auth/reset-password
      - /api/auth/verify-email
    admin-api-paths:
      - /api/admin/**
      - /api/management/**
    superadmin-api-paths:
      - /api/superadmin/**
      - /api/system/**
    cors:
      enabled: true
      allowed-origins:
        - "*"
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      exposed-headers:
        - "*"
      allow-credentials: true
      max-age: 3600
